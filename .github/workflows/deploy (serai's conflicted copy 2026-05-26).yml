name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Deploy to gh-pages branch
        run: |
          cd dist
          git init
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Deploy"
          git push --force https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/anthonyhauck/colored-shapes.git HEAD:gh-pages
